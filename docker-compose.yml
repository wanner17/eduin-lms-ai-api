version: "3.9"

# FastAPI는 systemd(lms-ai-api.service)로 직접 실행
# Qdrant는 GPU 서버에 기존 인스턴스 사용 → 별도 실행 불필요
# 이 파일은 Redis만 관리

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nextjs:
    build:
      context: ./eduin-lms-demo
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - LMS_API_URL=http://host.docker.internal:8100
      - LMS_API_KEY=dev-secret-key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
