version: "3.9"

services:
  api:
    build: .
    env_file: .env.production
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

volumes:
  qdrant_storage:
  uploads:
